name: "api_debug_challenge"
version: "1.0.0"
description: "A real-world environment where agents learn to interact with REST APIs"
tasks:
  - id: "fetch_user"
    name: "Fetch User"
    difficulty: "easy"
    description: "Fetch user details using GET /users/1"
  - id: "create_order"
    name: "Create Order"
    difficulty: "medium"
    description: "Create an order with correct payload using POST /orders"
  - id: "debug_api"
    name: "Debug API"
    difficulty: "hard"
    description: "Diagnose a degraded /status endpoint"
